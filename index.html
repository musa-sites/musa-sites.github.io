<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой Плеер</title>
    <style>
        /* Базовые настройки и цвета (темная тема) */
        :root {
            --primary: #1db954; /* Зеленый акцент */
            --bg: #121212;
            --panel: #181818;
            --text: #ffffff;
            --text-secondary: #b3b3b3;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Контейнер плеера */
        .player-container {
            background-color: var(--panel);
            width: 350px;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        /* Обложка */
        .art {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #2b2b2b, #404040);
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 60px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: transform 0.3s;
        }
        
        .art.playing {
            transform: scale(1.02);
            background: linear-gradient(135deg, #1db954, #127334);
        }

        /* Информация о треке */
        .info {
            text-align: center;
            margin-bottom: 20px;
        }

        .title {
            font-size: 1.2rem;
            font-weight: bold;
            margin: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Полоса прокрутки (прогресс-бар) */
        .progress-container {
            background: #404040;
            border-radius: 5px;
            height: 6px;
            width: 100%;
            margin-bottom: 20px;
            cursor: pointer;
        }

        .progress {
            background: var(--primary);
            height: 100%;
            border-radius: 5px;
            width: 0%;
            transition: width 0.1s linear;
        }

        /* Кнопки управления */
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            margin-bottom: 30px;
        }

        button {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1.5rem;
            transition: color 0.2s, transform 0.2s;
        }

        button:hover {
            color: var(--text);
        }

        .play-btn {
            background: var(--text);
            color: var(--bg);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            padding-left: 4px; /* Визуальное выравнивание треугольника */
        }

        .play-btn:hover {
            background: var(--primary);
            color: var(--bg);
            transform: scale(1.05);
        }

        /* Список плейлиста */
        .playlist-container {
            max-height: 150px;
            overflow-y: auto;
            border-top: 1px solid #333;
            padding-top: 15px;
            scroll-behavior: smooth;
        }

        /* Стилизация скроллбара */
        .playlist-container::-webkit-scrollbar {
            width: 6px;
        }
        .playlist-container::-webkit-scrollbar-thumb {
            background: #555;
            border-radius: 5px;
        }

        .playlist-item {
            padding: 10px;
            margin-bottom: 5px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.95rem;
            color: var(--text-secondary);
            transition: background 0.2s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .playlist-item:hover {
            background: #2a2a2a;
            color: var(--text);
        }

        .playlist-item.active {
            color: var(--primary);
            background: #2a2a2a;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="player-container">
        <div class="art" id="art">🎵</div>
        <div class="info">
            <p class="title" id="title">Трек не выбран</p>
        </div>

        <div class="progress-container" id="progress-container">
            <div class="progress" id="progress"></div>
        </div>

        <div class="controls">
            <button id="prev">⏮</button>
            <button class="play-btn" id="play">▶</button>
            <button id="next">⏭</button>
        </div>

        <div class="playlist-container" id="playlist">
            </div>

        <audio id="audio"></audio>
    </div>

    <script>
        // === АВТОМАТИЧЕСКАЯ ГЕНЕРАЦИЯ ПЛЕЙЛИСТА (от 1.mp3 до 500.mp3) ===
        const songs = [];
        for (let i = 1; i <= 500; i++) {
            songs.push(`${i}.mp3`);
        }

        // Элементы DOM
        const audio = document.getElementById('audio');
        const playBtn = document.getElementById('play');
        const prevBtn = document.getElementById('prev');
        const nextBtn = document.getElementById('next');
        const title = document.getElementById('title');
        const progressContainer = document.getElementById('progress-container');
        const progress = document.getElementById('progress');
        const playlistContainer = document.getElementById('playlist');
        const art = document.getElementById('art');

        let songIndex = 0;
        let isPlaying = false;

        // Инициализация плеера
        function initPlayer() {
            renderPlaylist();
            loadSong(songs[songIndex]);
        }

        // Загрузка трека
        function loadSong(song) {
            title.innerText = `Трек ${song.replace('.mp3', '')}`; // Будет писать "Трек 1", "Трек 2"
            audio.src = song;
            updatePlaylistActiveItem();
            
            // Прокручиваем плейлист к активному треку
            const activeItem = document.querySelectorAll('.playlist-item')[songIndex];
            if (activeItem) {
                activeItem.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }

        // Воспроизведение
        function playSong() {
            isPlaying = true;
            playBtn.innerHTML = "⏸";
            playBtn.style.paddingLeft = "0"; 
            art.classList.add('playing');
            
            // Если файла нет, выдаст предупреждение в консоль и попробует включить следующий
            audio.play().catch(e => {
                console.warn(`Файл ${songs[songIndex]} не найден или заблокирован браузером.`);
                // Раскомментируйте строчку ниже, если хотите, чтобы плеер сам листал пустые файлы
                // nextSong(); 
            });
        }

        // Пауза
        function pauseSong() {
            isPlaying = false;
            playBtn.innerHTML = "▶";
            playBtn.style.paddingLeft = "4px";
            art.classList.remove('playing');
            audio.pause();
        }

        // Предыдущий трек
        function prevSong() {
            songIndex--;
            if (songIndex < 0) {
                songIndex = songs.length - 1;
            }
            loadSong(songs[songIndex]);
            if (isPlaying) playSong();
        }

        // Следующий трек
        function nextSong() {
            songIndex++;
            if (songIndex > songs.length - 1) {
                songIndex = 0;
            }
            loadSong(songs[songIndex]);
            if (isPlaying) playSong();
        }

        // Обновление прогресс-бара
        function updateProgress(e) {
            const { duration, currentTime } = e.srcElement;
            if (duration) {
                const progressPercent = (currentTime / duration) * 100;
                progress.style.width = `${progressPercent}%`;
            }
        }

        // Перемотка кликом по прогресс-бару
        function setProgress(e) {
            const width = this.clientWidth;
            const clickX = e.offsetX;
            const duration = audio.duration;
            audio.currentTime = (clickX / width) * duration;
        }

        // Отрисовка плейлиста
        function renderPlaylist() {
            playlistContainer.innerHTML = '';
            songs.forEach((song, index) => {
                const item = document.createElement('div');
                item.classList.add('playlist-item');
                item.innerText = `Трек ${song.replace('.mp3', '')}`;
                
                // Клик по треку в плейлисте
                item.addEventListener('click', () => {
                    songIndex = index;
                    loadSong(songs[songIndex]);
                    playSong();
                });
                
                playlistContainer.appendChild(item);
            });
        }

        // Подсветка текущего трека в списке
        function updatePlaylistActiveItem() {
            const items = document.querySelectorAll('.playlist-item');
            items.forEach(item => item.classList.remove('active'));
            if(items[songIndex]) {
                items[songIndex].classList.add('active');
            }
        }

        // Слушатели событий
        playBtn.addEventListener('click', () => {
            isPlaying ? pauseSong() : playSong();
        });

        prevBtn.addEventListener('click', prevSong);
        nextBtn.addEventListener('click', nextSong);
        audio.addEventListener('timeupdate', updateProgress);
        progressContainer.addEventListener('click', setProgress);
        audio.addEventListener('ended', nextSong);

        // Запуск
        initPlayer();
    </script>
</body>
</html>
